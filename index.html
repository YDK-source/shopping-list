<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4F7CF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>רשימת הקניות של יוסי ומרים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase Realtime Database -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #F5F7FA;
  --surface: #FFFFFF;
  --surface2: #F0F2F7;
  --border: #E4E8F0;
  --text: #1E2235;
  --text2: #5C6380;
  --text3: #9BA3BF;
  --primary: #4F7CF7;
  --primary-light: #EEF2FF;
  --primary-dark: #3A5EC7;
  --checked: #22C55E;
  --checked-light: #F0FDF4;
  --checked-dark: #16A34A;
  --danger: #EF4444;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.12);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --transition: all .18s ease;
  --font: 'Heebo', sans-serif;
  --header-h: 120px;
  --filters-h: 56px;
  --bottom-nav-h: 64px;
}
[data-theme="dark"] {
  --bg: #0F1117;
  --surface: #1A1E2C;
  --surface2: #252A3A;
  --border: #2E3348;
  --text: #EEF0F7;
  --text2: #9BA3BF;
  --text3: #5C6380;
  --primary-light: #1E2A4A;
  --checked-light: #0D2818;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow: 0 4px 12px rgba(0,0,0,.4);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  direction: rtl;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input { font-family: var(--font); }
input:focus, button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

/* ===== LAYOUT ===== */
.app-wrapper { display: flex; flex-direction: column; min-height: 100dvh; }

/* ===== STICKY HEADER ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: env(safe-area-inset-top, 0) 0 0;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px;
  gap: 12px;
}
.app-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  white-space: nowrap;
}
.app-title span { color: var(--primary); }
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  color: var(--text2);
  transition: var(--transition);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--primary-light); color: var(--primary); }
.icon-btn.active { background: var(--primary); color: #fff; }

/* Search Bar */
.search-wrap {
  padding: 0 16px 10px;
  position: relative;
}
.search-wrap::before {
  content: '🔍';
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
  margin-top: -5px;
}
.search-input {
  width: 100%;
  height: 42px;
  border-radius: 22px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  padding: 0 42px 0 40px;
  font-size: 15px;
  color: var(--text);
  transition: var(--transition);
  direction: rtl;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(79,124,247,.12); }
.search-clear {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text3);
  color: #fff;
  font-size: 12px;
  display: none;
  align-items: center;
  justify-content: center;
  margin-top: -5px;
}
.search-clear.visible { display: flex; }

/* ===== FILTERS BAR ===== */
.filters-bar {
  position: sticky;
  top: var(--header-h);
  z-index: 99;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.filters-scroll {
  display: flex;
  gap: 6px;
  padding: 8px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filters-scroll::-webkit-scrollbar { display: none; }
.chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  white-space: nowrap;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.chip:hover { border-color: var(--primary); color: var(--primary); }
.chip.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }
.chip-count {
  background: rgba(255,255,255,.25);
  color: inherit;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 11px;
  font-weight: 700;
}
.chip:not(.active) .chip-count { background: var(--surface2); color: var(--text3); }

/* ===== VIEW BAR ===== */
.view-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  gap: 10px;
}
.view-tabs {
  display: flex;
  gap: 0;
  background: var(--surface2);
  border-radius: 22px;
  padding: 3px;
}
.view-tab {
  padding: 6px 14px;
  border-radius: 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.view-tab.active { background: var(--surface); color: var(--text); font-weight: 700; box-shadow: var(--shadow-sm); }
.sort-select {
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: var(--font);
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  direction: rtl;
}
.sort-select:focus { border-color: var(--primary); outline: none; }

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px 2px;
}
.stats-text {
  font-size: 13px;
  color: var(--text2);
  font-weight: 500;
}
.stats-count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--checked);
  color: #fff;
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 700;
}
.bulk-actions { display: flex; gap: 6px; }
.bulk-btn {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.bulk-btn:hover { color: var(--primary); background: var(--primary-light); }
.bulk-btn.danger:hover { color: var(--danger); background: #FEF2F2; }

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  padding: 12px 16px 24px;
  padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 16px) + 16px);
}

/* Category sections */
.category-section { margin-bottom: 8px; }
.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0 8px;
  cursor: pointer;
  user-select: none;
}
.category-emoji {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.category-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.category-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
}
.category-badge.has-checked { background: var(--checked-light); color: var(--checked-dark); }
.category-chevron {
  font-size: 12px;
  color: var(--text3);
  transition: transform .2s ease;
}
.category-section.collapsed .category-chevron { transform: rotate(-90deg); }
.category-section.collapsed .products-grid { display: none; }

/* Products Grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding-bottom: 4px;
}

/* Product Card */
.product-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.product-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 3px;
  height: 100%;
  background: transparent;
  transition: var(--transition);
}
.product-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.product-card.checked {
  background: var(--checked-light);
  border-color: #BBF7D0;
}
.product-card.checked::before { background: var(--checked); }

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.card-img {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: var(--surface2);
  transition: var(--transition);
}
.product-card.checked .card-img { background: #D1FAE5; }

.card-text { flex: 1; min-width: 0; }
.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  word-break: break-word;
  transition: var(--transition);
}
.product-card.checked .card-name { color: var(--checked-dark); }
.card-cat {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-notes {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  font-style: italic;
}

.card-toggle {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: var(--transition);
  flex-shrink: 0;
  color: transparent;
}
.product-card.checked .card-toggle {
  background: var(--checked);
  border-color: var(--checked);
  color: #fff;
}

/* Quantity Controls */
.qty-row {
  display: flex;
  align-items: center;
  gap: 4px;
  justify-content: center;
}
.qty-row.hidden { opacity: 0.3; pointer-events: none; }

.qty-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface2);
  color: var(--text2);
  font-size: 16px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.qty-btn:hover { background: var(--primary); color: #fff; }
.product-card.checked .qty-btn { background: #BBF7D0; color: var(--checked-dark); }
.product-card.checked .qty-btn:hover { background: var(--checked); color: #fff; }

.qty-input {
  width: 36px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  padding: 0;
  -moz-appearance: textfield;
}
.qty-input::-webkit-inner-spin-button,
.qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.qty-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(79,124,247,.15); }
.product-card.checked .qty-input { border-color: #BBF7D0; background: var(--surface); }

.qty-unit {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  max-width: 36px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
  gap: 12px;
}
.empty-state .emoji { font-size: 48px; }
.empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text); }
.empty-state p { font-size: 14px; color: var(--text2); }

/* ===== BOTTOM NAV (mobile) ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -4px 16px rgba(0,0,0,.06);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  gap: 3px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.nav-item:hover, .nav-item.active { color: var(--primary); }
.nav-icon { font-size: 20px; position: relative; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text3); }
.nav-item.active .nav-label { color: var(--primary); }
.nav-badge {
  position: absolute;
  top: -4px;
  left: -4px;
  background: var(--checked);
  color: #fff;
  border-radius: 10px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: 800;
  min-width: 16px;
  text-align: center;
}

/* ===== SUMMARY MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  animation: fadeIn .2s ease;
}
.modal-overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-sheet {
  width: 100%;
  max-height: 85dvh;
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  display: flex;
  flex-direction: column;
  animation: slideUp .25s ease;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
  cursor: pointer;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 18px; font-weight: 800; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  transition: var(--transition);
}
.modal-close:hover { background: var(--border); }

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  -webkit-overflow-scrolling: touch;
}
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  height: 46px;
  border-radius: 23px;
  font-size: 15px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  transition: var(--transition);
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline {
  background: var(--surface2);
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* Summary list */
.summary-group { margin-bottom: 16px; }
.summary-group-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.summary-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  gap: 8px;
}
.summary-item-name { font-size: 14px; font-weight: 600; flex: 1; }
.summary-item-qty {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  background: var(--primary-light);
  padding: 3px 10px;
  border-radius: 12px;
  white-space: nowrap;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: calc(var(--bottom-nav-h) + 16px + env(safe-area-inset-bottom, 0));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: all .3s ease;
  z-index: 500;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== DESKTOP ===== */
@media (min-width: 768px) {
  :root { --header-h: 110px; --bottom-nav-h: 0px; }
  .bottom-nav { display: none; }
  .main-content { padding-bottom: 40px; max-width: 1200px; margin: 0 auto; }
  .app-header { padding: 0 max(16px, calc(50vw - 600px)); }
  .filters-bar { padding: 0 max(16px, calc(50vw - 600px)); }
  .view-bar { padding: 10px max(16px, calc(50vw - 600px)); }
  .stats-bar { padding: 6px max(16px, calc(50vw - 600px)) 2px; }
  .main-content { padding: 16px max(16px, calc(50vw - 600px)) 40px; }
  .products-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .modal-sheet { max-width: 560px; margin: auto; border-radius: var(--radius-lg); max-height: 80vh; }
  .modal-overlay { align-items: center; }
}
@media (min-width: 1024px) {
  .products-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ===== SHOPPING MODE ===== */
body.shopping-mode .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
body.shopping-mode .product-card { padding: 14px 12px; }
body.shopping-mode .card-img { width: 48px; height: 48px; font-size: 26px; }
body.shopping-mode .card-name { font-size: 15px; }
body.shopping-mode .qty-btn { width: 36px; height: 36px; font-size: 18px; }
body.shopping-mode .qty-input { width: 40px; height: 36px; font-size: 16px; }
@media (min-width: 768px) {
  body.shopping-mode .products-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ===== ANIMATIONS ===== */
@keyframes checkPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.product-card.just-checked { animation: checkPop .25s ease; }

@keyframes qtyPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.qty-input.pulse { animation: qtyPulse .18s ease; }

/* ===== SYNC STATUS ===== */
.sync-dot {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  padding: 4px 9px;
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text3);
  transition: var(--transition);
  white-space: nowrap;
  cursor: default;
}
.sync-dot::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.sync-dot.synced  { color: #22C55E; }
.sync-dot.saving  { color: #F59E0B; }
.sync-dot.offline { color: #EF4444; }
.sync-dot.error   { color: #EF4444; }
.sync-dot.local   { color: var(--text3); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== CONFIRM DIALOG ===== */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 600;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.confirm-overlay.hidden { display: none; }
.confirm-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 320px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: popIn .2s ease;
}
@keyframes popIn { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.confirm-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.confirm-text { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns .btn { font-size: 14px; height: 40px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #DC2626; }
</style>

// ============================================================
// FIREBASE SYNC
// ============================================================
let db = null;
let syncEnabled = false;
let remoteWriteTimer = null;
let ignoreNextRemoteUpdate = false; // מונע loop: אנחנו כתבנו → Firebase שלח חזרה

function setSyncStatus(status, text) {
  const el = $('sync-status');
  if (!el) return;
  const labels = { synced: 'מסונכרן', saving: 'שומר...', offline: 'מנותק', error: 'שגיאה', local: 'מקומי' };
  el.className = 'sync-dot ' + status;
  el.textContent = text || labels[status] || status;
}

function initFirebase() {
  // אם ה-config עדיין placeholder — עובדים עם localStorage בלבד
  if (FIREBASE_CONFIG.apiKey.startsWith('REPLACE')) {
    setSyncStatus('local', 'מקומי');
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    syncEnabled = true;
    setSyncStatus('saving', 'מתחבר...');
    startFirebaseSync();
  } catch(e) {
    console.warn('Firebase init failed:', e);
    setSyncStatus('error', 'שגיאה');
  }
}

function startFirebaseSync() {
  if (!db) return;

  // מאזין לשינויים מרחוק (מהמשתמש השני)
  db.ref(DB_PATH + '/items').on('value', snapshot => {
    if (ignoreNextRemoteUpdate) { ignoreNextRemoteUpdate = false; return; }
    const remote = snapshot.val();
    if (!remote) return;
    // מיזוג: מקומי מנצח אם אין remote, remote מנצח אחרת
    state.items = { ...state.items, ...remote };
    saveLocalState();
    render();
    setSyncStatus('synced', 'מסונכרן');
  }, err => {
    console.warn('Firebase read error:', err);
    setSyncStatus('error', 'שגיאת קריאה');
  });

  // מצב חיבור
  firebase.database().ref('.info/connected').on('value', snap => {
    if (!snap.val()) setSyncStatus('offline', 'מנותק');
  });

  // קריאה ראשונית מ-Firebase (מנצח על localStorage)
  db.ref(DB_PATH + '/items').get().then(snap => {
    const remote = snap.val();
    if (remote) {
      state.items = { ...state.items, ...remote };
      saveLocalState();
      render();
    }
    setSyncStatus('synced', 'מסונכרן');
  }).catch(() => setSyncStatus('error', 'שגיאה'));
}

// שמירה לFirebase — debounced 600ms כדי לא לשלוח על כל לחיצה
function saveState() {
  saveLocalState();
  if (!syncEnabled || !db) return;
  setSyncStatus('saving', 'שומר...');
  clearTimeout(remoteWriteTimer);
  remoteWriteTimer = setTimeout(() => {
    ignoreNextRemoteUpdate = true;
    db.ref(DB_PATH + '/items').set(state.items)
      .then(() => setSyncStatus('synced', 'מסונכרן'))
      .catch(e => { console.warn('Firebase write error:', e); setSyncStatus('error', 'שגיאת שמירה'); });
  }, 600);
}

function getItem(id) {
  if (!state.items[id]) {
    const p = PRODUCTS.find(p => p.id === id);
    state.items[id] = { checked: false, qty: p ? p.defaultQty : 1 };
  }
  return state.items[id];
}

function getFilteredProducts() {
  const { cat, view, sort } = state.filter;
  const search = ($('search-input').value || '').trim().toLowerCase();

  let list = PRODUCTS.filter(p => {
    if (cat !== 'all' && p.category !== cat) return false;
    if (view === 'checked' && !getItem(p.id).checked) return false;
    if (search && !p.name.toLowerCase().includes(search)) return false;
    return true;
  });

  if (sort === 'alpha') list = [...list].sort((a,b) => a.name.localeCompare(b.name, 'he'));
  else if (sort === 'checked') list = [...list].sort((a,b) => (getItem(b.id).checked ? 1 : 0) - (getItem(a.id).checked ? 1 : 0));

  return list;
}

function renderCard(p) {
  const item = getItem(p.id);
  const cat = CAT_MAP[p.category];
  const checked = item.checked;
  const qty = item.qty;

  return `<div class="product-card${checked ? ' checked' : ''}" data-id="${p.id}">
    <div class="card-top">
      <div class="card-img" style="background:${checked ? '' : cat.color}18">${cat.emoji}</div>
      <div class="card-text">
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-cat">${esc(cat.short)}</div>
      </div>
      <button class="card-toggle" data-action="toggle" data-id="${p.id}" aria-label="סמן לקנייה">${checked ? '✓' : ''}</button>
    </div>
    <div class="qty-row${!checked ? ' hidden' : ''}">
      <button class="qty-btn" data-action="minus" data-id="${p.id}" aria-label="הפחת כמות">−</button>
      <input class="qty-input" type="number" min="0" step="0.5" value="${qty}" data-id="${p.id}" aria-label="כמות" inputmode="decimal">
      <span class="qty-unit">${esc(p.unit)}</span>
      <button class="qty-btn" data-action="plus" data-id="${p.id}" aria-label="הוסף כמות">+</button>
    </div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const list = getFilteredProducts();
  const main = $('main-content');

  if (list.length === 0) {
    const { view } = state.filter;
    const search = ($('search-input').value || '').trim();
    main.innerHTML = `<div class="empty-state">
      <div class="emoji">${search ? '🔍' : view === 'checked' ? '🛒' : '🥦'}</div>
      <h3>${search ? 'לא נמצאו תוצאות' : view === 'checked' ? 'לא סומנו מוצרים' : 'אין מוצרים'}</h3>
      <p>${search ? 'נסה חיפוש אחר' : view === 'checked' ? 'סמן מוצרים לקנייה' : ''}</p>
    </div>`;
    return;
  }

  const { sort } = state.filter;
  const search = ($('search-input').value || '').trim().toLowerCase();

  if (sort !== 'default' || search || state.filter.cat !== 'all') {
    // Flat grid
    main.innerHTML = `<div class="products-grid">${list.map(renderCard).join('')}</div>`;
  } else {
    // Grouped by category
    const groups = {};
    list.forEach(p => {
      if (!groups[p.category]) groups[p.category] = [];
      groups[p.category].push(p);
    });

    let html = '';
    CATEGORIES.forEach(cat => {
      const prods = groups[cat.id];
      if (!prods || prods.length === 0) return;
      const checkedInCat = prods.filter(p => getItem(p.id).checked).length;
      const collapsed = state.collapsedCats && state.collapsedCats[cat.id];
      html += `<div class="category-section${collapsed ? ' collapsed' : ''}" data-cat-section="${cat.id}">
        <div class="category-header" data-cat-toggle="${cat.id}">
          <div class="category-emoji" style="background:${cat.color}18">${cat.emoji}</div>
          <div class="category-title">${esc(cat.name)}</div>
          <div class="category-badge${checkedInCat > 0 ? ' has-checked' : ''}">${checkedInCat > 0 ? checkedInCat + '/' : ''}${prods.length}</div>
          <div class="category-chevron">▾</div>
        </div>
        ${!collapsed ? `<div class="products-grid">${prods.map(renderCard).join('')}</div>` : ''}
      </div>`;
    });
    main.innerHTML = html;
  }

  updateStats();
}

function updateStats() {
  const checked = PRODUCTS.filter(p => getItem(p.id).checked);
  const count = checked.length;
  const totalQty = checked.reduce((s, p) => s + (parseFloat(getItem(p.id).qty) || 0), 0);

  $('stats-checked-count').textContent = `${count} פריטים`;

  const badge = $('nav-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }

  // Update category chips counts
  $$('.chip[data-cat]').forEach(chip => {
    const catId = chip.dataset.cat;
    const countEl = chip.querySelector('.chip-count');
    if (!countEl) return;
    if (catId === 'all') {
      const tot = PRODUCTS.filter(p => getItem(p.id).checked).length;
      countEl.textContent = tot || '';
      countEl.style.display = tot > 0 ? '' : 'none';
    } else {
      const cat = PRODUCTS.filter(p => p.category === catId);
      const c = cat.filter(p => getItem(p.id).checked).length;
      countEl.textContent = c || '';
      countEl.style.display = c > 0 ? '' : 'none';
    }
  });
}

  CATEGORIES.forEach(cat => {

function handleCardAction(e) {
  const btn = e.target.closest('[data-action]');
  const input = e.target.closest('.qty-input');
  const card = e.target.closest('.product-card');

  if (!card) return;
  const id = parseInt(card.dataset.id);
  if (!id) return;

  if (btn) {
    const action = btn.dataset.action;
    const item = getItem(id);
    const p = PRODUCTS.find(p => p.id === id);

    if (action === 'toggle') {
      item.checked = !item.checked;
      if (item.checked && !item.qty) item.qty = p.defaultQty || 1;
      card.classList.toggle('checked', item.checked);
      card.classList.add('just-checked');
      setTimeout(() => card.classList.remove('just-checked'), 300);
      const qtyRow = card.querySelector('.qty-row');
      if (qtyRow) qtyRow.classList.toggle('hidden', !item.checked);
      card.querySelector('.card-toggle').textContent = item.checked ? '✓' : '';
      saveState();
      updateStats();
      return;
    }

    if (action === 'plus') {
      item.qty = Math.round((parseFloat(item.qty) || 0) * 2 + 1) / 2;
      updateQtyDisplay(id, item.qty);
      saveState();
      return;
    }

    if (action === 'minus') {
      const newQty = Math.max(0, Math.round(((parseFloat(item.qty) || 0) - 1) * 2) / 2);
      item.qty = newQty;
      if (newQty === 0) { item.checked = false; saveState(); render(); return; }
      updateQtyDisplay(id, item.qty);
      saveState();
      return;
    }
  }

  if (input && input.dataset.id) {
    const iid = parseInt(input.dataset.id);
    const v = parseFloat(input.value);
    if (!isNaN(v) && v >= 0) {
      const item = getItem(iid);
      item.qty = v;
      if (v === 0) { item.checked = false; saveState(); render(); }
      else { saveState(); }
    }
    return;
  }
}

function updateQtyDisplay(id, qty) {
  const card = document.querySelector(`.product-card[data-id="${id}"]`);
  if (!card) return;
  const inp = card.querySelector('.qty-input');
  if (inp) {
    inp.value = qty;
    inp.classList.add('pulse');
    setTimeout(() => inp.classList.remove('pulse'), 200);
  }
}

  }
});

    $$('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === state.filter.view));
    $('nav-all').classList.toggle('active', state.filter.view === 'all');
    $('nav-checked').classList.toggle('active', state.filter.view === 'checked');
    saveState();
    render();
  });
});

// Sort
$('sort-select').addEventListener('change', function() {
  state.filter.sort = this.value;
  saveState();
  render();
});

// Category collapse (delegated on main-content)
$('main-content').addEventListener('click', e => {
  const hdr = e.target.closest('[data-cat-toggle]');
  if (!hdr) return;
  const catId = hdr.dataset.catToggle;
  if (!state.collapsedCats) state.collapsedCats = {};
  state.collapsedCats[catId] = !state.collapsedCats[catId];
  saveState();
  render();
});

// Bottom nav
$('nav-all').addEventListener('click', () => {
  state.filter.view = 'all';
  $$('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'all'));
  $('nav-all').classList.add('active');
  $('nav-checked').classList.remove('active');
  saveState(); render();
});
$('nav-checked').addEventListener('click', () => {
  state.filter.view = 'checked';
  $$('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'checked'));
  $('nav-checked').classList.add('active');
  $('nav-all').classList.remove('active');
  saveState(); render();
});
$('nav-cats').addEventListener('click', () => {
  $('filters-scroll').scrollIntoView({ behavior: 'smooth', block: 'start' });
});
$('nav-summary-btn').addEventListener('click', openSummary);

// Summary modal
function openSummary() { renderSummary(); $('summary-modal').classList.remove('hidden'); }
function closeSummary() { $('summary-modal').classList.add('hidden'); }
$('btn-summary').addEventListener('click', openSummary);
$('modal-close').addEventListener('click', closeSummary);
$('modal-handle').addEventListener('click', closeSummary);
$('summary-modal').addEventListener('click', e => { if (e.target === $('summary-modal')) closeSummary(); });

$('btn-copy').addEventListener('click', () => {
  const text = getSummaryText();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('✅ הועתק ללוח'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('✅ הועתק ללוח');
  }
});

$('btn-share').addEventListener('click', () => {
  const text = getSummaryText();
  if (navigator.share) {
    navigator.share({ title: 'רשימת קניות', text }).catch(() => {});
  } else {
    $('btn-copy').click();
  }
});

// Header actions
$('btn-darkmode').addEventListener('click', () => {
  state.darkMode = !state.darkMode;
  document.documentElement.dataset.theme = state.darkMode ? 'dark' : '';
  $('btn-darkmode').classList.toggle('active', state.darkMode);
  saveState();
});

$('btn-shopping-mode').addEventListener('click', () => {
  state.shoppingMode = !state.shoppingMode;
  document.body.classList.toggle('shopping-mode', state.shoppingMode);
  $('btn-shopping-mode').classList.toggle('active', state.shoppingMode);
  showToast(state.shoppingMode ? '🛍️ מצב קנייה פעיל' : 'מצב רגיל');
  saveState();
});

// Bulk actions
$('btn-select-all').addEventListener('click', () => {
  confirm('בחר הכל', 'לסמן את כל המוצרים המוצגים כרגע לקנייה?', () => {
    getFilteredProducts().forEach(p => {
      const item = getItem(p.id);
      item.checked = true;
      if (!item.qty) item.qty = p.defaultQty || 1;
    });
    saveState(); render(); showToast('✅ כל המוצרים סומנו');
  });
});

$('btn-clear-all').addEventListener('click', () => {
  confirm('נקה הכל', 'לבטל את הסימון של כל המוצרים?', () => {
    PRODUCTS.forEach(p => { const item = getItem(p.id); item.checked = false; });
    saveState(); render(); showToast('🗑️ הרשימה נוקתה');
  });
});

// ============================================================
// INIT
// ============================================================
function init() {
  // Apply saved state
  if (state.darkMode) document.documentElement.dataset.theme = 'dark';
  if (state.shoppingMode) document.body.classList.add('shopping-mode');
  $('btn-darkmode').classList.toggle('active', !!state.darkMode);
  $('btn-shopping-mode').classList.toggle('active', !!state.shoppingMode);
  $('sort-select').value = state.filter.sort || 'default';
  $$('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === state.filter.view));

  renderFilters();
  render();

  // Initial filter chip state
  $$('.chip[data-cat]').forEach(c => c.classList.toggle('active', c.dataset.cat === state.filter.cat));

  // Firebase sync — קורה אחרי הrender הראשוני
  initFirebase();
}

init();
</script>
</body>
</html>
